{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white pb-0 border-bottom-0 pt-4 px-4">
          <h4 class="mb-0">Nueva Carpeta en {{ sw.nombre }}</h4>
        </div>
        <div class="card-body px-4 pb-4">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-bold">Nombre de la carpeta</label>
              {{ form.nombre }}
              {% if form.nombre.errors %}
              <div class="text-danger small mt-1">{{ form.nombre.errors }}</div>
              {% endif %}
            </div>
            <div class="d-flex justify-content-end gap-2 mt-4">
              <a href="{% url 'software_detalle' sw.pk %}" class="btn btn-light">Cancelar</a>
              <button type="submit" class="btn btn-primary">Crear Carpeta</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
