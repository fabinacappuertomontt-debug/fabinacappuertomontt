{# Un campo del wizard. Uso: {% include "proyectos/wizard/_campo.html" with campo=form.nombre %} #}
<div class="wizard-campo {{ ancho|default:'' }}">
    <label class="form-label" for="{{ campo.id_for_label }}">{{ campo.label }}</label>
    {{ campo }}
    {% if campo.help_text %}<div class="form-text">{{ campo.help_text }}</div>{% endif %}
    {% for error in campo.errors %}<div class="text-danger small fw-bold">{{ error }}</div>{% endfor %}
</div>
